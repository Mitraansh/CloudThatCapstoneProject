name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Validate Groq Secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          test -n "$GROQ_API_KEY" || (echo "GROQ_API_KEY is missing" && exit 1)
          echo "Groq API Key found"

      - name: Run Promptfoo Evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: promptfoo eval --output results.json

      - name: Check pass rate
        run: |
          PASS=$(python3 -c "
          import json
          with open('results.json') as f:
              d=json.load(f)
          s=d['results']['stats']
          rate=s['successes']/s['total']*100 if s['total'] else 0
          print(f'{rate:.1f}')
          ")
          echo "Pass Rate: $PASS%"
          python3 -c "exit(0 if float('$PASS')>=80 else 1)"