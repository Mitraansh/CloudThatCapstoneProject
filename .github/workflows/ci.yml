name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Validate required secrets
        env:
          HUGGINGFACE_API_TOKEN: ${{ secrets.TEST }}
        run: |
          if [ -z "$HUGGINGFACE_API_TOKEN" ]; then
            echo "HUGGINGFACE_API_TOKEN is not available"
            exit 1
          fi

          echo "Token exists"
          echo "Token length: ${#HUGGINGFACE_API_TOKEN}"

      # ADD THIS
      - name: Show Promptfoo version
        run: promptfoo --version

      # ADD THIS
      - name: Test Hugging Face API
        env:
          HUGGINGFACE_API_TOKEN: ${{ secrets.TEST }}
        run: |
          curl -i \
            https://router.huggingface.co/v1/models \
            -H "Authorization: Bearer $HUGGINGFACE_API_TOKEN"

      - name: Run evals
        env:
          HUGGINGFACE_API_TOKEN: ${{ secrets.TEST }}
        run: promptfoo eval --output results.json

      - name: Check pass rate
        run: |
          PASS=$(python3 -c "
          import json
          with open('results.json') as f:
              d = json.load(f)
          s = d['results']['stats']
          rate = s['successes'] / s['total'] * 100
          print(f'{rate:.1f}')
          ")
          echo "Eval pass rate: $PASS%"
          python3 -c "exit(0 if float('$PASS') >= 80 else 1)" || \
            (echo "BLOCKED: Pass rate $PASS% is below 80% threshold." && exit 1)