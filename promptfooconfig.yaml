prompts:
  - |
    Review the Flower Shop FastAPI project files provided below and confirm that the backend contains the expected routes and helpers.
    
    Check the provided Backend/app.py for: signup, login, chat, classify_query, and the /api/status endpoint.
    Check the provided README.md for promptfoo eval instructions.

    ---
    FILE: Backend/app.py
    ---
    file://Backend/app.py

    ---
    FILE: README.md
    ---
    file://README.md

providers:
  - id: groq:llama-3.3-70b-versatile

tests:
  - description: "Output contains the signup route"
    assert:
      - type: contains
        value: "def signup"

  - description: "Output contains the login route"
    assert:
      - type: contains
        value: "def login"

  - description: "Output contains the chat route"
    assert:
      - type: contains
        value: "def chat"

  - description: "Output contains the classifier helper"
    assert:
      - type: contains
        value: "def classify_query"

  - description: "Output mentions the status endpoint"
    assert:
      - type: contains
        value: "/api/status"