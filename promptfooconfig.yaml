# promptfooconfig.yml
prompts:
  - |
      Review the Flower Shop FastAPI project files and confirm that the backend contains the expected routes and helpers.
      Check Backend/app.py for signup, login, chat, classify_query, and the /api/status endpoint.
      Check README.md for promptfoo eval instructions.

providers:
  - id: huggingface:chat:meta-llama/Llama-3.1-8B-Instruct

tests:
  - description: "Output contains the signup route"
    assert:
      - type: contains
        value: "def signup"

  - description: "Output contains the login route"
    assert:
      - type: contains
        value: "def login"

  - description: "Output contains the chat route"
    assert:
      - type: contains
        value: "def chat"

  - description: "Output contains the classifier helper"
    assert:
      - type: contains
        value: "def classify_query"

  - description: "Output mentions the status endpoint"
    assert:
      - type: contains
        value: "/api/status"
